<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SOFRÉTMA TRANSIT – Site en cours de développement</title>
  <style>
    :root {
      --bleu-ocean: #005f73;
      --or: #d4a017;
      --vert: #007f5f;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, var(--bleu-ocean), #00809d);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1rem;
      max-width: 1000px;
      margin: 0 auto;
    }

    .logo {
      max-width: 180px;
      margin-bottom: 1.5rem;
    }

    .hero-banner {
      max-width: 100%;
      height: auto;
      margin: 1rem 0 2rem 0;
      border-radius: 12px;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
    }

    h1 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      letter-spacing: 0.1rem;
    }

    .slogan {
      font-size: 1.1rem;
      margin-bottom: 0.8rem;
      line-height: 1.5;
      max-width: 700px;
    }

    .message {
      font-size: 1.1rem;
      margin: 0.8rem 0 1.8rem 0;
      font-weight: 500;
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    }

    .loading {
      width: 60px;
      height: 60px;
      border: 5px solid rgba(255, 255, 255, 0.3);
      border-top: 5px solid var(--or);
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
      margin: 2rem 0;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .services-list {
      list-style: none;
      margin-bottom: 2rem;
      text-align: left;
      max-width: 520px;
    }

    .services-list li {
      margin-bottom: 0.9rem;
      position: relative;
      padding-left: 1.2rem;
      opacity: 0.95;
    }

    .services-list li:before {
      content: "▹";
      color: var(--or);
      position: absolute;
      left: 0;
      top: 0;
      font-size: 1.2rem;
    }

    .footer-info {
      font-size: 0.9rem;
      margin-top: 2rem;
      max-width: 550px;
      line-height: 1.65;
      color: #f0f8ff;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      padding-top: 1.1rem;
    }

    @media (max-width: 550px) {
      h1 { font-size: 1.6rem; }
      .slogan, .services-list, .footer-info { font-size: 0.95rem; }
      .hero-banner { max-width: 100%; }
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <!-- Logo -->
    <img src="images/logo-sofretma.webp" alt="Logo SOFRÉTMA TRANSIT" class="logo" />
